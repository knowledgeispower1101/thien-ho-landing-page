<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon base (industrial/tech feel) -->
  <polygon points="20,1 36,10 36,30 20,39 4,30 4,10" fill="#2563EB" opacity="0.12"/>
  <polygon points="20,3 34,11 34,29 20,37 6,29 6,11" fill="none" stroke="#2563EB" stroke-width="1.5"/>

  <!-- Tiger face - geometric, angular design -->
  <!-- Left ear -->
  <polygon points="12,12 9,6 16,10" fill="#2563EB"/>
  <!-- Right ear -->
  <polygon points="28,12 31,6 24,10" fill="#2563EB"/>

  <!-- Left side of face (orange) -->
  <polygon points="8,14 20,16 14,26 10,22" fill="#F97316"/>
  <!-- Right side of face (blue) -->
  <polygon points="32,14 20,16 26,26 30,22" fill="#2563EB"/>

  <!-- Forehead stripe (Tiger "王" pattern) -->
  <rect x="16" y="12" width="8" height="2" rx="1" fill="#fff" opacity="0.9"/>
  <rect x="18.5" y="9" width="3" height="2" rx="1" fill="#fff" opacity="0.9"/>

  <!-- Eyes -->
  <polygon points="13,17 15,15 17,17 15,19" fill="#fff"/>
  <polygon points="23,17 25,15 27,17 25,19" fill="#fff"/>
  <circle cx="15" cy="17" r="1.5" fill="#08080f"/>
  <circle cx="25" cy="17" r="1.5" fill="#08080f"/>

  <!-- Nose -->
  <polygon points="20,21 18,23 22,23" fill="#2563EB"/>

  <!-- Muzzle (aggressive tiger smile) -->
  <path d="M14 25 Q20 30 26 25" stroke="#2563EB" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="6" y1="20" x2="13" y2="22" stroke="#2563EB" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="5" y1="23" x2="12" y2="24" stroke="#2563EB" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Whiskers right -->
  <line x1="34" y1="20" x2="27" y2="22" stroke="#2563EB" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="35" y1="23" x2="28" y2="24" stroke="#2563EB" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Chin -->
  <path d="M17 27 Q20 29 23 27" stroke="#F97316" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
